# Java client: Synthetic Reference
datafye-synthetic-reference.client.samples.connectionDescriptor=solace://localhost:55555&client_name=samples-synthetic-reference
datafye-synthetic-reference.client.samples.responseTimeout=5

# Java client: Synthetic Feed (quotes, trades)
datafye-synthetic-feed.client.samples.connectionDescriptor=solace://localhost:55555&client_name=samples-synthetic-feed
datafye-synthetic-feed.client.samples.responseTimeout=5
# For StreamLiveTopOfBook and StreamLiveTrades
datafye-synthetic-feed.stream.samples.connectionDescriptor=solace://localhost:55555&client_name=samples-synthetic-feed-stream
datafye-synthetic-feed.stream.samples.trace=config

# Java client: Synthetic Agg (OHLC candles)
datafye-synthetic-agg.client.samples.connectionDescriptor=solace://localhost:55555&client_name=samples-synthetic-agg
datafye-synthetic-agg.client.samples.responseTimeout=5

# Java client: Synthetic History
datafye-synthetic-history.client.samples.connectionDescriptor=solace://localhost:55555&client_name=samples-synthetic-history
datafye-synthetic-history.client.samples.responseTimeout=5

# Java client: SIP History (for streaming samples - streaming requires the SIP client)
datafye-sip-history.client.samples.connectionDescriptor=solace://localhost:55555&client_name=samples-sip-history
datafye-sip-history.client.samples.responseTimeout=5
datafye-sip-history.stream.samples.trace=config

# REST API endpoint
datafye-samples.api.endpoint=localhost:7776
